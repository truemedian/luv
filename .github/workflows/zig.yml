name: Zig

on: [push, pull_request]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        lua_engine: [Lua, LuaJIT]
        lua_shared: [shared, static, system, luarocks]
        libuv_shared: [shared, static, system]
        debug_mode: [debug, release]
        exclude:
        - lua_shared: luarocks
          lua_engine: LuaJIT
    steps:
    - uses: actions/checkout@v4

    - uses: mlugg/setup-zig@v1
      with:
        version: 0.13.0

    - name: Install Dependencies
      run: sudo apt-get install -y lua5.4 luarocks luajit lua-cjson-dev liblua5.4-dev libluajit-5.1-dev libuv1-dev

    - name: Build
      run: sh .ci/build_with_zig.sh ${{ matrix.lua_engine }} ${{ matrix.lua_shared }} ${{ matrix.libuv_shared }} ${{ matrix.debug_mode }}